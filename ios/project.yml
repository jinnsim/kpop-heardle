name: KPopHeardle
options:
  bundleIdPrefix: com.ootssu
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  developmentLanguage: en
  # K-pop fan markets — keep in sync with Localizable.xcstrings.
  # Region codes use Xcode's expected form (fil for Filipino, zh-Hans /
  # zh-Hant for Simplified / Traditional Chinese, pt-BR for Brazilian PT).
  knownRegions:
    - en
    - ko
    - ja
    - zh-Hans
    - zh-Hant
    - es
    - pt-BR
    - id
    - th
    - vi
    - fil
    - ms
    - hi
    - Base

settings:
  base:
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1,2"
    SUPPORTS_MACCATALYST: NO
    ENABLE_USER_SCRIPT_SANDBOXING: YES

targets:
  KPopHeardle:
    type: application
    platform: iOS
    sources:
      - path: KPopHeardle
    info:
      path: KPopHeardle/Info.plist
      properties:
        CFBundleDisplayName: K-Pop Heardle
        UILaunchScreen:
          UIColorName: ""
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        ITSAppUsesNonExemptEncryption: false
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.ootssu.kpopheardle
        GENERATE_INFOPLIST_FILE: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        DEVELOPMENT_TEAM: "LQZYM2U744"
        CODE_SIGN_STYLE: Automatic
